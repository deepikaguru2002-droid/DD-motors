<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Vehicle | DD Motors</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1995/1995506.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6fb;
            color: #1f2933;
        }

        .page-header {
            background: #fff;
            padding: 20px 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h1 {
            font-size: 26px;
        }

        .page-header a {
            color: #f39c12;
            text-decoration: none;
            border: 1px solid #f39c12;
            padding: 8px 14px;
            border-radius: 8px;
        }

        .page-content {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        .booking-card {
            background: #fff;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .booking-card h2 {
            margin-bottom: 20px;
        }

        .booking-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .form-row-full {
            grid-column: 1 / -1;
        }

        .button-row {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .submit-btn {
            background: #f39c12;
            color: white;
        }

        .clear-btn {
            background: #ddd;
        }

        @media (max-width: 768px) {
            .booking-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header class="page-header">
        <h1>Book Your Vehicle</h1>
        <a href="javascript:history.back()">Back to Home</a>
    </header>

    <main class="page-content">

        <div class="booking-card">
            <h2>Booking Details</h2>

            <form onsubmit="handleSubmit(event)">
                <div class="booking-grid">

                    <!-- Customer -->
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" required>
                    </div>

                    <div class="form-group">
                        <label>Phone Number 📞 *</label>
                        <input type="tel" required>
                    </div>

                    <div class="form-group">
                        <label>Email ID *</label>
                        <input type="email" required>
                    </div>

                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text">
                    </div>

                    <div class="form-group form-row-full">
                        <label>Business Type (Construction / Logistics / Mining etc.)</label>
                        <input type="text">
                    </div>

                    <h3 class="section-title">
                        2. Company & Address</h3>
                    <div class="form-group form-row-full">
                        <label>Business Address</label>
                        <input type="text">
                    </div>

                    <div class="form-group">
                        <label>City</label>
                        <input type="text">
                    </div>

                    <div class="form-group">
                        <label>State</label>
                        <input type="text">
                    </div>

                    <div class="form-group">
                        <label>Pincode</label>
                        <input type="text">
                    </div>

                    <h3 class="section-title">🔹 3. Vehicle Requirement (Main 🔥)</h3>
                    <div class="form-group">
                        <label>Vehicle Type *</label>
                        <select required>
                            <option value="">Select</option>
                            <option>Truck</option>
                            <option>Lorry</option>
                            <option>Trailer</option>
                            <option>Crane</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>No. of Vehicles *</label>
                        <input type="number" required>
                    </div>

                    <!-- Load -->
                    <div class="form-group">
                        <label>Load Type *</label>
                        <input type="text" required>
                    </div>

                    <div class="form-group">
                        <label>Weight (Tons) *</label>
                        <input type="number" required>
                    </div>

                    <div class="form-group">
                        <label>Trip Type *</label>
                        <select required>
                            <option value="">Select</option>
                            <option>One Way</option>
                            <option>Round Trip</option>
                        </select>
                    </div>

                    <!-- Extra -->
                    <div class="form-group">
                        <label>Driver Required *</label>
                        <select required>
                            <option value="">Select</option>
                            <option>Yes</option>
                            <option>No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Budget</label>
                        <input type="number">
                    </div>

                    <div class="form-group form-row-full">
                        <label>Notes</label>
                        <textarea></textarea>
                    </div>

                </div>

                <div class="button-row">
                    <button type="submit" class="submit-btn">Submit</button>
                    <button type="reset" class="clear-btn">Clear</button>
                </div>

            </form>
        </div>

    </main>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            alert("Booking Submitted Successfully!");
        }
    </script>

</body>

</html>
